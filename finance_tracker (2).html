<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance Ledger</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:system-ui,-apple-system,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
  .app{max-width:900px;margin:0 auto;padding:16px}

  .header{display:flex;align-items:center;justify-content:space-between;background:#fff;padding:16px 20px;border-radius:14px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
  .header h1{font-size:20px;font-weight:700}
  .header .sub{font-size:12px;color:#888;margin-top:3px}

  .members-list{display:flex;flex-direction:column;gap:10px}
  .member-card{background:#fff;border:1px solid #e8e8e0;border-radius:14px;padding:16px 18px;cursor:pointer;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.04)}
  .member-card:hover{border-color:#aaa;box-shadow:0 2px 8px rgba(0,0,0,.08)}
  .member-card.finished{border-color:#4ade80;background:#f0fdf4}
  .mc-top{display:flex;align-items:center;gap:12px}
  .avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;flex-shrink:0}
  .mc-info{flex:1;min-width:0}
  .mc-name{font-size:15px;font-weight:600}
  .mc-meta{font-size:11px;color:#888;margin-top:2px}
  .mc-badge{font-size:10px;padding:3px 10px;border-radius:12px;font-weight:700}
  .badge-daily{background:#dbeafe;color:#1d4ed8}
  .badge-weekly{background:#fef3c7;color:#b45309}
  .badge-done{background:#dcfce7;color:#15803d}
  .progress-bar{height:5px;background:#f0f0ea;border-radius:3px;margin-top:12px;overflow:hidden}
  .progress-fill{height:100%;border-radius:3px;transition:width .4s;background:#1a1a1a}
  .progress-fill.done{background:#22c55e}
  .mc-amounts{display:flex;gap:20px;margin-top:12px;font-size:13px;flex-wrap:wrap}
  .mc-amounts span{color:#888}
  .mc-amounts strong{color:#1a1a1a;font-weight:600}
  .add-btn{width:100%;padding:12px;border:1.5px dashed #ccc;border-radius:14px;background:transparent;color:#888;font-size:14px;cursor:pointer;transition:all .15s;margin-top:4px}
  .add-btn:hover{background:#f9f9f6;color:#1a1a1a;border-color:#999}

  /* Modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px}
  .modal{background:#fff;border-radius:18px;padding:24px;width:100%;max-width:460px;max-height:92vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.18)}
  .modal h2{font-size:18px;font-weight:700;margin-bottom:4px}
  .modal-sub{font-size:12px;color:#888;margin-bottom:18px}
  .field{margin-bottom:14px}
  .field label{font-size:12px;color:#555;display:block;margin-bottom:5px;font-weight:600}
  .field input{width:100%;padding:10px 12px;border:1.5px solid #e0e0d8;border-radius:10px;font-size:14px;background:#fff;color:#1a1a1a;outline:none;transition:all .2s}
  .field input:focus{border-color:#1a1a1a}
  .field input.auto-filled{background:#f0fdf4;border-color:#22c55e;color:#15803d;font-weight:700}
  .row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}

  /* Daily/Weekly colour toggle */
  .type-toggle{display:flex;border-radius:10px;overflow:hidden;border:1.5px solid #e0e0d8}
  .type-btn{flex:1;padding:10px;border:none;font-size:14px;cursor:pointer;font-weight:700;transition:all .25s;outline:none;letter-spacing:.01em}
  .type-btn.daily-btn{background:#fff;color:#aaa}
  .type-btn.daily-btn.sel{background:#1d4ed8;color:#fff}
  .type-btn.weekly-btn{background:#fff;color:#aaa;border-left:1.5px solid #e0e0d8}
  .type-btn.weekly-btn.sel{background:#b45309;color:#fff}

  /* Interest preview card */
  .ip-card{background:#f0fdf4;border:1.5px solid #86efac;border-radius:12px;padding:14px 16px;margin-bottom:14px;display:none}
  .ip-card.show{display:block}
  .ip-title{font-size:11px;font-weight:700;color:#15803d;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px}
  .ip-row{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin-bottom:7px}
  .ip-row span{color:#555}
  .ip-row strong{font-weight:600;color:#1a1a1a}
  .ip-divider{border:none;border-top:1px solid #86efac;margin:10px 0}
  .ip-total{display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:#15803d}
  .ip-formula{font-size:11px;color:#888;margin-top:8px;font-style:italic;line-height:1.6}

  /* Buttons */
  .btn-row{display:flex;gap:8px;margin-top:18px}
  .btn{padding:10px 20px;border-radius:10px;font-size:14px;cursor:pointer;border:1px solid #e0e0d8;background:#fff;color:#1a1a1a;transition:all .15s;font-weight:500}
  .btn:hover{background:#f5f5f0}
  .btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .btn.primary:hover{background:#333}
  .btn.danger{color:#dc2626;border-color:#fca5a5}
  .btn.danger:hover{background:#fef2f2}

  /* Detail */
  .detail-header{display:flex;align-items:center;gap:10px;margin-bottom:18px;background:#fff;padding:14px 16px;border-radius:14px;border:1px solid #e8e8e0}
  .back-btn{padding:6px 14px;border:1px solid #e0e0d8;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#666;font-weight:500}
  .back-btn:hover{background:#f5f5f0}
  .stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .stat{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #e8e8e0}
  .stat .label{font-size:11px;color:#888;margin-bottom:5px;font-weight:500}
  .stat .val{font-size:20px;font-weight:700}
  .stat .val.green{color:#16a34a}
  .stat .val.red{color:#dc2626}

  /* Entry panel */
  .entry-panel{background:#fff;border:1px solid #e8e8e0;border-radius:14px;padding:16px;margin-bottom:14px}
  .entry-panel h3{font-size:11px;font-weight:700;margin-bottom:12px;color:#888;text-transform:uppercase;letter-spacing:.05em}
  .quick-amounts{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
  .qa-btn{padding:8px 16px;border:1px solid #e0e0d8;border-radius:20px;font-size:14px;cursor:pointer;background:#fff;color:#1a1a1a;transition:all .15s;font-weight:500}
  .qa-btn:hover,.qa-btn.sel{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
  .entry-row{display:flex;gap:10px;align-items:flex-end}
  .entry-row input{flex:1;padding:10px 12px;border:1.5px solid #e0e0d8;border-radius:10px;font-size:15px;background:#fff;color:#1a1a1a;outline:none;transition:border .15s}
  .entry-row input:focus{border-color:#1a1a1a}

  /* Ledger */
  .ledger-wrap{background:#fff;border:1px solid #e8e8e0;border-radius:14px;overflow:hidden}
  .ledger-table{width:100%;border-collapse:collapse;font-size:13px}
  .ledger-table th{text-align:left;padding:9px 14px;font-weight:700;font-size:11px;color:#888;border-bottom:1px solid #e8e8e0;background:#fafaf8;text-transform:uppercase;letter-spacing:.04em}
  .ledger-table td{padding:10px 14px;border-bottom:1px solid #f0f0ea}
  .ledger-table tr:last-child td{border-bottom:none}
  .ledger-table tr:hover td{background:#fafaf8}

  /* Misc */
  .toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:12px 24px;border-radius:24px;font-size:13px;z-index:200;opacity:0;transition:opacity .3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.2);white-space:nowrap}
  .toast.show{opacity:1}
  .finish-banner{background:#f0fdf4;border:1px solid #86efac;border-radius:12px;padding:14px 18px;margin-bottom:14px;font-size:14px;color:#15803d;display:flex;align-items:center;gap:10px;font-weight:500}
  .dot{width:10px;height:10px;border-radius:50%;background:#22c55e;flex-shrink:0}
  .empty{text-align:center;padding:36px;color:#aaa;font-size:14px;line-height:1.8}
  .section-title{font-size:11px;font-weight:700;color:#bbb;margin:18px 0 8px;text-transform:uppercase;letter-spacing:.06em;padding-left:2px}

  @media(max-width:500px){
    .stat-grid{grid-template-columns:repeat(2,1fr)}
    .row2{grid-template-columns:1fr}
    .mc-amounts{gap:10px}
  }
</style>
</head>
<body>
<div class="app" id="app"></div>
<div class="toast" id="toast"></div>
<script>
let state={
  view:'list', selectedId:null,
  members:JSON.parse(localStorage.getItem('fm_members')||'[]'),
  showModal:false, entryAmount:'', selectedQuick:null
};
const COLORS=[
  {bg:'#dbeafe',text:'#1e40af'},{bg:'#d1fae5',text:'#065f46'},
  {bg:'#fef3c7',text:'#92400e'},{bg:'#fce7f3',text:'#9d174d'},
  {bg:'#ede9fe',text:'#4c1d95'},{bg:'#fee2e2',text:'#991b1b'},
  {bg:'#ccfbf1',text:'#134e4a'},{bg:'#ffedd5',text:'#7c2d12'}
];
function getColor(i){return COLORS[i%COLORS.length];}
function fmt(n){return '₹'+Number(n).toLocaleString('en-IN');}
function today(){
  const d=new Date();
  return d.getDate().toString().padStart(2,'0')+'/'+(d.getMonth()+1).toString().padStart(2,'0')+'/'+d.getFullYear();
}
function toDateStr(d){
  if(!d)return '';
  try{const p=d.split('/');return new Date(p[2],p[1]-1,p[0]).toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});}
  catch(e){return d;}
}
function save(){try{localStorage.setItem('fm_members',JSON.stringify(state.members));}catch(e){}}
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3200);
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ── AUTO INTEREST CALCULATOR ──────────────────────────────────────────────────
// Formula: Interest = Principal × (Rate/100) × Months
// daily customer  → months = period ÷ 30
// weekly customer → months = period ÷ 4.33
let modalType='daily';

function calcAutoInterest(principal,rate,period,type){
  if(!principal||!rate||!period) return null;
  const months=parseFloat((type==='daily'?period/30:period/4.33).toFixed(2));
  const interest=Math.round(principal*(rate/100)*months);
  return {interest,months};
}

function updateInterestPreview(){
  const principal=parseFloat(document.getElementById('f-principal')?.value)||0;
  const rate=parseFloat(document.getElementById('f-rate')?.value)||0;
  const period=parseInt(document.getElementById('f-period')?.value)||0;
  const card=document.getElementById('ip-card');
  const fInt=document.getElementById('f-interest');
  if(!card||!fInt) return;
  const result=calcAutoInterest(principal,rate,period,modalType);
  if(result){
    const {interest,months}=result;
    const total=principal+interest;
    card.classList.add('show');
    card.innerHTML=`
      <div class="ip-title">⚡ Auto Interest Calculation</div>
      <div class="ip-row"><span>Principal Amount</span><strong>${fmt(principal)}</strong></div>
      <div class="ip-row"><span>Interest Rate</span><strong>${rate}% per month</strong></div>
      <div class="ip-row"><span>Duration</span><strong>${period} ${modalType==='daily'?'days':'weeks'} = ${months} months</strong></div>
      <div class="ip-row"><span>Interest Amount</span><strong style="color:#15803d;font-size:15px">${fmt(interest)}</strong></div>
      <hr class="ip-divider">
      <div class="ip-total"><span>Total to Collect</span><span>${fmt(total)}</span></div>
      <div class="ip-formula">Formula: ${fmt(principal)} × ${rate}% × ${months} months = ${fmt(interest)}</div>
    `;
    fInt.value=interest;
    fInt.classList.add('auto-filled');
  } else {
    card.classList.remove('show');
    fInt.value='';
    fInt.classList.remove('auto-filled');
  }
}

function selType(t){
  modalType=t;
  const db=document.getElementById('tb-daily');
  const wb=document.getElementById('tb-weekly');
  if(db&&wb){
    db.classList.toggle('sel',t==='daily');
    wb.classList.toggle('sel',t==='weekly');
  }
  // update period placeholder label
  const lbl=document.getElementById('period-label');
  if(lbl) lbl.textContent='Time Period (number of '+(t==='daily'?'days':'weeks')+') *';
  updateInterestPreview();
}

// ── MEMBER CRUD ───────────────────────────────────────────────────────────────
function addMember(data){
  const total=parseFloat(data.principal)+parseFloat(data.interest);
  state.members.push({
    id:Date.now(),name:data.name,phone:data.phone,
    principal:parseFloat(data.principal),
    interestAmount:parseFloat(data.interest),
    rate:parseFloat(data.rate),
    totalDue:total,type:data.type,
    period:parseInt(data.period),
    startDate:today(),payments:[],finished:false
  });
  save(); state.showModal=false; render();
}

function recordPayment(memberId,amount){
  const m=state.members.find(x=>x.id===memberId);
  if(!m||m.finished) return;
  const paid=m.payments.reduce((s,p)=>s+p.amount,0);
  const remaining=m.totalDue-paid;
  if(amount>remaining) amount=remaining;
  m.payments.push({date:today(),amount});
  if(paid+amount>=m.totalDue){
    m.finished=true; m.finishedDate=today();
    showToast('🎉 '+m.name+' has completed the full payment!');
  }
  save(); state.entryAmount=''; state.selectedQuick=null; render();
}

function deleteMember(id){
  if(confirm('Remove this member and all their records?')){
    state.members=state.members.filter(x=>x.id!==id);
    save(); state.view='list'; render();
  }
}

function calcRemaining(m){return Math.max(0,m.totalDue-m.payments.reduce((s,p)=>s+p.amount,0));}
function calcPaid(m){return m.payments.reduce((s,p)=>s+p.amount,0);}
function pct(m){return Math.min(100,Math.round(calcPaid(m)/m.totalDue*100));}

// ── RENDER: LIST ──────────────────────────────────────────────────────────────
function renderList(){
  const active=state.members.filter(m=>!m.finished);
  const done=state.members.filter(m=>m.finished);
  let h='<div class="members-list">';
  if(state.members.length===0)
    h+=`<div class="empty">No members yet.<br>Tap <b>+ Add New Member</b> to get started.</div>`;

  if(active.length>0){
    h+=`<div class="section-title">Active Members (${active.length})</div>`;
    active.forEach(m=>{
      const c=getColor(state.members.indexOf(m)),p=pct(m);
      h+=`<div class="member-card" onclick="openDetail(${m.id})">
        <div class="mc-top">
          <div class="avatar" style="background:${c.bg};color:${c.text}">${m.name.charAt(0).toUpperCase()}</div>
          <div class="mc-info">
            <div class="mc-name">${esc(m.name)}${m.phone?` <span style="font-weight:400;font-size:12px;color:#999">· ${esc(m.phone)}</span>`:''}</div>
            <div class="mc-meta">Started ${toDateStr(m.startDate)} · ${m.period} ${m.type==='daily'?'day':'week'}${m.period>1?'s':''} · ${m.rate}%/month</div>
          </div>
          <span class="mc-badge ${m.type==='daily'?'badge-daily':'badge-weekly'}">${m.type}</span>
        </div>
        <div class="mc-amounts">
          <div><span>Total Due: </span><strong>${fmt(m.totalDue)}</strong></div>
          <div><span>Paid: </span><strong style="color:#16a34a">${fmt(calcPaid(m))}</strong></div>
          <div><span>Remaining: </span><strong style="color:#dc2626">${fmt(calcRemaining(m))}</strong></div>
        </div>
        <div class="progress-bar"><div class="progress-fill ${p>=100?'done':''}" style="width:${p}%"></div></div>
      </div>`;
    });
  }

  if(done.length>0){
    h+=`<div class="section-title">Completed (${done.length})</div>`;
    done.forEach(m=>{
      const c=getColor(state.members.indexOf(m));
      h+=`<div class="member-card finished" onclick="openDetail(${m.id})">
        <div class="mc-top">
          <div class="avatar" style="background:${c.bg};color:${c.text}">${m.name.charAt(0).toUpperCase()}</div>
          <div class="mc-info">
            <div class="mc-name">${esc(m.name)}</div>
            <div class="mc-meta">Completed on ${toDateStr(m.finishedDate)}</div>
          </div>
          <span class="mc-badge badge-done">Finished ✓</span>
        </div>
        <div class="mc-amounts">
          <div><span>Total Received: </span><strong style="color:#16a34a">${fmt(m.totalDue)}</strong></div>
          <div><span>Principal: </span><strong>${fmt(m.principal)}</strong></div>
          <div><span>Interest: </span><strong>${fmt(m.interestAmount)}</strong></div>
        </div>
        <div class="progress-bar"><div class="progress-fill done" style="width:100%"></div></div>
      </div>`;
    });
  }

  h+=`<button class="add-btn" onclick="openModal()">+ Add New Member</button></div>`;
  return h;
}

// ── RENDER: DETAIL ────────────────────────────────────────────────────────────
function renderDetail(){
  const m=state.members.find(x=>x.id===state.selectedId);
  if(!m) return '';
  const paid=calcPaid(m),remaining=calcRemaining(m),p=pct(m);
  const c=getColor(state.members.indexOf(m));
  const QUICK=[100,200,300,500,1000,2000];
  let h='';

  const typeBg=m.type==='daily'?'#dbeafe':'#fef3c7';
  const typeClr=m.type==='daily'?'#1d4ed8':'#b45309';

  h+=`<div class="detail-header">
    <button class="back-btn" onclick="goBack()">← Back</button>
    <div class="avatar" style="background:${c.bg};color:${c.text};width:36px;height:36px;font-size:14px">${m.name.charAt(0).toUpperCase()}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:16px;font-weight:700">${esc(m.name)}${m.phone?` <span style="font-weight:400;font-size:12px;color:#888">· ${esc(m.phone)}</span>`:''}</div>
      <div style="font-size:11px;color:#888;margin-top:3px">
        <span style="background:${typeBg};color:${typeClr};padding:2px 8px;border-radius:8px;font-weight:700;font-size:10px">${m.type.toUpperCase()}</span>
        &nbsp;${m.period} ${m.type==='daily'?'day':'week'}${m.period>1?'s':''} &nbsp;·&nbsp; ${m.rate}%/month &nbsp;·&nbsp; Started ${toDateStr(m.startDate)}
      </div>
    </div>
    <button class="btn danger" onclick="deleteMember(${m.id})" style="font-size:12px;padding:6px 12px">Delete</button>
  </div>`;

  if(m.finished){
    h+=`<div class="finish-banner"><div class="dot"></div>Payment fully completed on ${toDateStr(m.finishedDate)}! All dues cleared. 🎉</div>`;
  }

  h+=`<div class="stat-grid">
    <div class="stat"><div class="label">Total Due</div><div class="val">${fmt(m.totalDue)}</div></div>
    <div class="stat"><div class="label">Total Paid</div><div class="val green">${fmt(paid)}</div></div>
    <div class="stat"><div class="label">Remaining</div><div class="val ${remaining>0?'red':'green'}">${fmt(remaining)}</div></div>
    <div class="stat"><div class="label">Principal</div><div class="val">${fmt(m.principal)}</div></div>
    <div class="stat"><div class="label">Interest</div><div class="val">${fmt(m.interestAmount)}</div></div>
    <div class="stat"><div class="label">Progress</div><div class="val">${p}%</div></div>
  </div>
  <div class="progress-bar" style="height:7px;margin-bottom:18px;border-radius:4px">
    <div class="progress-fill ${p>=100?'done':''}" style="width:${p}%;border-radius:4px"></div>
  </div>`;

  if(!m.finished){
    h+=`<div class="entry-panel">
      <h3>Record Payment — Today: ${today()}</h3>
      <div class="quick-amounts">`;
    QUICK.forEach(q=>{
      h+=`<button class="qa-btn ${state.selectedQuick===q?'sel':''}" onclick="selectQuick(${m.id},${q})">${fmt(q)}</button>`;
    });
    h+=`</div>
      <div class="entry-row">
        <div style="flex:1">
          <div style="font-size:11px;color:#888;margin-bottom:5px;font-weight:600">Custom amount (₹)</div>
          <input type="number" id="amt-input" placeholder="Enter amount" value="${state.entryAmount||''}"
            oninput="state.entryAmount=this.value;state.selectedQuick=null;document.querySelectorAll('.qa-btn').forEach(b=>b.classList.remove('sel'))">
        </div>
        <button class="btn primary" onclick="submitPayment(${m.id})" style="height:42px;margin-top:18px;padding:0 24px">Record</button>
      </div>
    </div>`;
  }

  h+=`<div class="section-title">Payment Ledger (${m.payments.length} entries)</div>`;
  if(m.payments.length>0){
    h+=`<div class="ledger-wrap"><table class="ledger-table">
      <thead><tr><th>#</th><th>Date</th><th>Amount Paid</th><th>Remaining</th></tr></thead><tbody>`;
    let runPaid=0;
    m.payments.forEach((pay,i)=>{
      runPaid+=pay.amount;
      const rem=Math.max(0,m.totalDue-runPaid);
      h+=`<tr>
        <td style="color:#bbb;width:36px;font-size:12px">${i+1}</td>
        <td style="color:#888;font-size:12px">${toDateStr(pay.date)}</td>
        <td style="font-weight:700;color:#16a34a">${fmt(pay.amount)}</td>
        <td style="font-weight:600;color:${rem===0?'#16a34a':'#1a1a1a'}">${fmt(rem)}</td>
      </tr>`;
    });
    h+=`</tbody></table></div>`;
  } else {
    h+=`<div class="empty">No payments recorded yet.<br>Use the form above to add the first payment.</div>`;
  }
  return h;
}

// ── RENDER: MODAL ─────────────────────────────────────────────────────────────
function renderModal(){
  if(!state.showModal) return '';
  const d=modalType==='daily';
  return `<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal">
      <h2>Add New Member</h2>
      <div class="modal-sub">Interest is auto-calculated as you type ⚡</div>

      <div class="field"><label>Full Name *</label>
        <input type="text" id="f-name" placeholder="e.g. Rajan Kumar">
      </div>
      <div class="field"><label>Phone Number (optional)</label>
        <input type="tel" id="f-phone" placeholder="e.g. 9876543210">
      </div>

      <div class="row2">
        <div class="field"><label>Principal Amount (₹) *</label>
          <input type="number" id="f-principal" placeholder="e.g. 10000" oninput="updateInterestPreview()">
        </div>
        <div class="field"><label>Interest Rate (% / month) *</label>
          <input type="number" id="f-rate" placeholder="e.g. 2" step="0.1" oninput="updateInterestPreview()">
        </div>
      </div>

      <div class="field">
        <label>Payment Type *</label>
        <div class="type-toggle">
          <button class="type-btn daily-btn ${d?'sel':''}" id="tb-daily" onclick="selType('daily')">🔵 &nbsp;Daily</button>
          <button class="type-btn weekly-btn ${!d?'sel':''}" id="tb-weekly" onclick="selType('weekly')">🟡 &nbsp;Weekly</button>
        </div>
      </div>

      <div class="field">
        <label id="period-label">Time Period (number of ${d?'days':'weeks'}) *</label>
        <input type="number" id="f-period" placeholder="${d?'e.g. 30 days':'e.g. 12 weeks'}" oninput="updateInterestPreview()">
      </div>

      <div id="ip-card" class="ip-card"></div>

      <div class="field">
        <label>Interest Amount (₹) — auto-filled ✓</label>
        <input type="number" id="f-interest" placeholder="Will be filled automatically" readonly style="cursor:not-allowed;opacity:.85">
      </div>

      <div class="btn-row">
        <button class="btn" onclick="closeModal()" style="flex:1">Cancel</button>
        <button class="btn primary" onclick="submitMember()" style="flex:2">Add Member</button>
      </div>
    </div>
  </div>`;
}

// ── MAIN RENDER ───────────────────────────────────────────────────────────────
function render(){
  const app=document.getElementById('app');
  const totalPrincipal=state.members.reduce((s,m)=>s+m.principal,0);
  const totalOutstanding=state.members.filter(m=>!m.finished).reduce((s,m)=>s+calcRemaining(m),0);
  let h=`<div class="header">
    <div>
      <h1>Finance Ledger</h1>
      <div class="sub">${state.members.length} member${state.members.length!==1?'s':''} &nbsp;·&nbsp; Principal given: ${fmt(totalPrincipal)} &nbsp;·&nbsp; Outstanding: ${fmt(totalOutstanding)}</div>
    </div>
  </div>`;
  if(state.view==='list') h+=renderList();
  else h+=renderDetail();
  h+=renderModal();
  app.innerHTML=h;
}

// ── ACTIONS ───────────────────────────────────────────────────────────────────
function openModal(){
  state.showModal=true; modalType='daily'; render();
  setTimeout(()=>{const el=document.getElementById('f-name');if(el)el.focus();},50);
}
function closeModal(){state.showModal=false; render();}
function openDetail(id){state.selectedId=id;state.view='detail';state.entryAmount='';state.selectedQuick=null;render();}
function goBack(){state.view='list';render();}
function selectQuick(mid,amt){state.selectedQuick=amt;state.entryAmount=amt;render();}

function submitPayment(mid){
  const inp=document.getElementById('amt-input');
  const val=state.selectedQuick||(inp?parseFloat(inp.value):0);
  if(!val||val<=0){showToast('Please enter a valid amount');return;}
  recordPayment(mid,val);
}

function submitMember(){
  const name=(document.getElementById('f-name')?.value||'').trim();
  const phone=(document.getElementById('f-phone')?.value||'').trim();
  const principal=parseFloat(document.getElementById('f-principal')?.value||0);
  const rate=parseFloat(document.getElementById('f-rate')?.value||0);
  const interest=parseFloat(document.getElementById('f-interest')?.value||0);
  const period=parseInt(document.getElementById('f-period')?.value||0);
  if(!name)                     {showToast('Please enter member name');return;}
  if(!principal||principal<=0)  {showToast('Please enter principal amount');return;}
  if(!rate||rate<=0)            {showToast('Please enter interest rate');return;}
  if(!interest||isNaN(interest)){showToast('Interest not calculated yet — fill all fields');return;}
  if(!period||period<=0)        {showToast('Please enter time period');return;}
  addMember({name,phone,principal,interest,rate,type:modalType,period});
  showToast(name+' added successfully!');
}

render();
</script>
</body>
</html>
